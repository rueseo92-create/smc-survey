<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SMC 소아응급 퇴원교육 — 전문가 설문</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css" rel="stylesheet">
<style>
:root{
  --bg:#F0F2F5;--surface:#FFF;--border:#E5E7EB;--text:#1A1D23;--text2:#6B7280;--text3:#9CA3AF;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-border:#BFDBFE;
  --green:#16A34A;--green-bg:#F0FDF4;--green-border:#BBF7D0;
  --red:#DC2626;--red-bg:#FEF2F2;--red-border:#FECACA;
  --orange:#D97706;--orange-bg:#FFFBEB;--orange-border:#FDE68A;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}

/* Progress bar top */
.progress-bar{position:fixed;top:0;left:0;right:0;height:4px;background:var(--border);z-index:100;}
.progress-fill{height:100%;background:var(--blue);transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:0 2px 2px 0;}

/* Container */
.container{max-width:640px;margin:0 auto;padding:20px 16px 100px;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}

/* Landing */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
.landing-card{background:var(--surface);border-radius:20px;padding:48px 36px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08);}
.landing-icon{font-size:56px;margin-bottom:16px;}
.landing h1{font-size:20px;font-weight:800;margin-bottom:4px;}
.landing h2{font-size:16px;font-weight:700;color:var(--blue);margin-bottom:24px;}
.landing p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:28px;}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-primary{background:var(--blue);color:#FFF;}
.btn-primary:hover{background:#1D4ED8;}
.btn-secondary{background:transparent;color:var(--text3);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--text2);color:var(--text2);}
.btn:disabled{opacity:.5;cursor:default;}

/* Header */
.step-header{margin-bottom:20px;}
.step-header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.step-back{background:none;border:none;font-size:13px;color:var(--text2);cursor:pointer;padding:0;font-family:inherit;}
.step-count{font-size:12px;color:var(--text3);font-weight:600;}
.step-title{font-size:18px;font-weight:800;margin-bottom:10px;}
.mini-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.mini-progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}

/* Module info badges */
.badge-cc{font-size:11px;font-weight:600;color:#065F46;background:#ECFDF5;padding:5px 10px;border-radius:6px;margin-bottom:6px;display:block;line-height:1.5;}
.badge-ev{font-size:11px;color:#92400E;background:#FFFBEB;padding:5px 10px;border-radius:6px;line-height:1.5;display:block;}

/* Item card */
.item{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:all .2s;}
.item.agreed{border-color:var(--green-border);background:var(--green-bg);}
.item.disagreed{border-color:var(--red-border);background:var(--red-bg);}
.item.is-red{border-left:3px solid var(--red);}
.item.is-orange{border-left:3px solid var(--orange);}
.item-top{display:flex;gap:10px;align-items:flex-start;}
.item-num{font-size:11px;font-weight:700;color:var(--text3);min-width:22px;text-align:right;padding-top:2px;}
.item-body{flex:1;}
.item-text{font-size:14px;line-height:1.7;margin-bottom:10px;}
.item-text.red-text{color:var(--red);font-weight:600;}
.item-text.orange-text{color:var(--orange);font-weight:600;}

/* Agree/Disagree buttons */
.vote-row{display:flex;gap:8px;}
.vote-btn{flex:1;padding:10px 0;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;}
.vote-agree{border:1.5px solid var(--border);background:#FFF;color:var(--text2);}
.vote-agree.active{border:2px solid var(--green);background:var(--green-bg);color:var(--green);}
.vote-disagree{border:1.5px solid var(--border);background:#FFF;color:var(--text2);}
.vote-disagree.active{border:2px solid var(--red);background:var(--red-bg);color:var(--red);}

/* Disagree panel */
.disagree-panel{margin-top:10px;padding:12px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;animation:slideDown .2s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.disagree-tabs{display:flex;gap:6px;margin-bottom:10px;}
.disagree-tab{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s;}
.disagree-tab.modify{border:1.5px solid var(--border);background:#FFF;color:var(--text2);}
.disagree-tab.modify.active{border-color:var(--orange);background:var(--orange-bg);color:var(--orange);}
.disagree-tab.delete{border:1.5px solid var(--border);background:#FFF;color:var(--text2);}
.disagree-tab.delete.active{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.disagree-textarea{width:100%;min-height:60px;padding:10px;border:1px solid var(--red-border);border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;background:#FFF;}

/* Module comment */
.module-comment textarea{width:100%;min-height:70px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;}

/* Nav */
.nav-row{display:flex;gap:8px;margin-top:20px;padding-bottom:20px;}

/* Field */
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;}
.field input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;}
.field input:focus{outline:none;border-color:var(--blue);}

/* Info box */
.info-box{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:8px;padding:14px;font-size:13px;color:#1E40AF;line-height:1.7;}

/* Overall */
.overall-q{margin-bottom:18px;}
.overall-q label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.overall-q textarea{width:100%;min-height:80px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;}

/* Done */
.done{text-align:center;padding:48px 24px;}
.done-icon{font-size:64px;margin-bottom:16px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1D23;color:#FFF;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:200;opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* Stats badge in header */
.stats-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;}
.stats-badge.green{background:var(--green-bg);color:var(--green);}
.stats-badge.gray{background:#F3F4F6;color:var(--text3);}

/* Resume section */
.resume-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border);width:100%;}
.resume-row{display:flex;gap:8px;margin-top:8px;}
.resume-input{flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:16px;
  font-family:'Pretendard',monospace;text-align:center;letter-spacing:4px;text-transform:uppercase;}
.resume-input:focus{outline:none;border-color:var(--blue);}
.resume-input::placeholder{letter-spacing:normal;font-size:13px;}
.btn-resume{padding:11px 20px;border:none;border-radius:8px;background:var(--green);color:#FFF;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-resume:disabled{opacity:.5;cursor:default;}

/* Draft modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;
  justify-content:center;z-index:300;animation:fadeIn .2s ease;}
.modal-card{background:var(--surface);border-radius:16px;padding:32px 28px;max-width:380px;width:90%;
  text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.15);}
.modal-code{font-size:36px;font-weight:800;letter-spacing:8px;color:var(--blue);margin:16px 0;
  font-family:'Pretendard',monospace;user-select:all;}
.modal-hint{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.btn-copy{padding:10px 24px;border:1.5px solid var(--blue);border-radius:8px;background:var(--blue-bg);
  color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:8px;}
.btn-close-modal{padding:10px 24px;border:1px solid var(--border);border-radius:8px;background:var(--surface);
  color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.btn-draft{background:transparent;color:var(--green);border:1.5px solid var(--green);font-size:13px;padding:10px 14px;}
.btn-draft:hover{background:var(--green-bg);}
.nav-row .btn-draft{flex:0 0 auto;width:auto;}
.resume-error{color:var(--red);font-size:12px;margin-top:6px;display:none;}

/* Mobile */
@media(max-width:480px){
  .container{padding:16px 12px 100px;}
  .card{padding:18px 16px;}
  .item{padding:12px 14px;}
  .item-text{font-size:13px;}
}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const MODULES = 
[
{id:'A',name:'공통 퇴원교육',cc:'모든 CC에 기본 적용',ev:'ACEP Disposition Policy (2024); WHO IMCI (2014); Engel KG et al., Ann Emerg Med (2009); Samuels-Kalow ME et al., Acad Emerg Med (2010)',items:["외출 후, 밥 먹기 전, 화장실 다녀온 후에는 반드시 비누로 30초 이상 손을 깨끗이 씻어주세요.","물이나 보리차 등 아이가 좋아하는 음료를 조금씩 자주 먹여주세요. 수분 섭취가 매우 중요합니다.","소화가 잘 되는 부드러운 음식부터 시작해서 조금씩 평소 먹던 음식으로 늘려주세요.","방 안 온도는 22~24도, 습도는 50~60%로 맞춰주시고, 하루에 2~3번 창문을 열어 환기해주세요.","아이 주변에 위험한 물건(날카로운 것, 작은 장난감 조각, 뜨거운 물 등)이 없는지 확인해주세요.","처방받은 약은 정해진 양과 시간에 맞춰서 꼭 먹여주세요. 약은 아이 손이 닿지 않는 곳에 보관해주세요.","물약은 냉장고에, 가루약은 햇빛이 닿지 않는 서늘한 곳에 보관해주세요. 유통기한도 확인해주세요.","아이의 체온, 먹은 양, 소변 횟수, 기분 상태 등을 메모해두시면 다음 진료 때 도움이 됩니다.","다음과 같은 모습이 보이면 몸에 수분이 부족한 것은 아닌지 살펴주세요: 입술이 마르거나, 6시간 이상 소변을 안 보거나, 울 때 눈물이 안 나오거나, 눈이 움푹 들어가 보일 때입니다.","아이의 예방접종이 빠진 것은 없는지 확인해주세요.","🔴 아이의 의식이 흐려지거나, 경련을 하거나, 숨쉬기를 매우 힘들어하면 즉시 119에 전화하시거나 가까운 응급실로 와주세요.","🟠 48시간이 지나도 나아지지 않거나 오히려 나빠지면, 외래 또는 응급실에 다시 방문해주세요."]},
{id:'B',name:'발열',cc:'[14] Fever, [50] Chilling',ev:'AAP Fever & Antipyretic Use (2011/2016); NICE CG160 (2019); Sullivan & Farrar, Pediatrics (2011); 대한소아과학회 (2019); Yin et al., JAMA Pediatr (2014)',items:["열이 나는 것은 우리 몸이 병균과 싸우고 있다는 뜻이에요. 열 자체가 뇌에 해를 끼치지는 않으니 너무 걱정하지 않으셔도 됩니다.","아이가 편안하게 쉴 수 있도록 조용한 환경을 만들어주세요.","물, 보리차, 이온음료 등을 조금씩 자주 먹여주세요. 젖먹이 아기는 젖을 더 자주 물려주세요.","체온은 겨드랑이(3분 유지), 귀, 또는 항문(아기)으로 재주세요. 잰 시간과 부위를 함께 적어두세요.","옷은 가볍고 통풍이 잘 되는 것으로 한 겹만 입혀주세요. 이불로 꽁꽁 싸지 않도록 해주세요.","미지근한 물(30~33도)로 몸을 가볍게 닦아줄 수 있습니다. 찬물이나 알코올은 절대 사용하지 마세요.","열이 38.5도 이상이고 아이가 힘들어하면 열 내리는 약를 먹여주세요. 숫자보다는 아이가 얼마나 힘들어하는지가 더 중요합니다.","열 내리는 약는 반드시 어린이용(물약이나 가루)을 사용해주세요. 어른용 약은 주지 마세요.","타이레놀과 부루펜을 번갈아 먹이는 것은 의사 선생님이 안내한 경우에만 해주세요.","아스피린은 아이에게 절대 먹이지 마세요. 심각한 부작용이 생길 수 있습니다.","열이 나면 입맛이 없는 것은 자연스러운 현상입니다. 억지로 먹이지 마시고, 물을 자주 먹이는 것이 더 중요합니다.","열 때문에 경련(온몸을 떠는 증상)이 생기면, 아이를 옆으로 눕히고 입에 아무것도 넣지 마세요. 시간을 재주세요. 5분 넘게 계속되면 119에 전화해주세요.","체온, 열 내리는 약 먹인 시간, 물 먹인 양을 메모해두시면 진료 시 큰 도움이 됩니다.","열 내리는 약 없이 24시간 동안 열이 안 나면 어린이집이나 학교에 보내도 됩니다.","🔴 다음 중 하나라도 해당하면 즉시 119에 전화하시거나 응급실에 오세요: 생후 3개월 미만 아기의 38도 이상 열, 경련, 아이가 축 늘어짐, 숨쉬기 힘들어함, 보라색 반점이 생김.","🔴 경련이 5분 넘게 지속되거나, 경련 후 의식이 돌아오지 않거나, 목이 뻣뻣해지면 즉시 119에 전화해주세요.","🟠 열이 3일 넘게 계속되거나, 열 내리는 약를 먹여도 열이 안 내리거나, 발진이나 구토 같은 새로운 증상이 나타나면 다시 병원에 와주세요.","🟠 소변을 8시간 넘게 안 보면 다시 진료를 받아주세요."]},
{id:'C',name:'심혈관',cc:'[7] Palpitation, [9] Chest pain, [10] Chest discomfort, [70] Edema',ev:'AAP Chest Pain in Children (2010); Friedman & Alexander, Pediatrics in Review (2010); Flynn et al., ACC/AHA Pediatric HTN (2017); Massin et al., Pediatrics (2006)',items:["어린이의 가슴 통증은 대부분(95% 이상) 심장과 관계없는 가벼운 원인입니다. 검사 결과 심각한 문제는 없는 것으로 확인되었으니 안심하셔도 됩니다.","증상이 있는 동안에는 격렬한 운동을 피하고 충분히 쉬게 해주세요.","커피, 에너지 음료, 콜라 같은 카페인이 들어간 음료는 가슴 두근거림을 심하게 할 수 있으니 피해주세요.","물을 충분히 마시게 해주세요. 몸에 수분이 부족하면 가슴이 두근거리거나 어지러울 수 있습니다.","증상이 나타난 시각, 얼마나 오래 계속됐는지, 그때 무엇을 하고 있었는지를 적어두시면 진료에 도움이 됩니다.","처방받은 심장약이 있다면 정해진 시간에 빠짐없이 먹여주세요. 임의로 약을 끊지 마세요.","몸이 붓는 증상이 있으면, 부은 부위를 심장보다 높게 올려주시고 짠 음식을 줄여주세요.","규칙적으로 잠을 자고, 스트레스를 줄이는 것이 증상 완화에 도움이 됩니다.","🔴 갑자기 의식을 잃거나, 운동 중에 쓰러지거나, 숨쉬기가 매우 힘들거나, 입술이 파래지면 즉시 119에 전화해주세요.","🟠 가슴 두근거림이 10분 넘게 계속되거나, 붓기가 심해지거나, 운동할 때 비정상적으로 피곤해하면 외래에 방문해주세요."]},
{id:'D',name:'호흡기',cc:'[11] Coughing, [12] Dyspnea, [30] Hyperventilation',ev:'GINA 2023; Bjornson & Johnson, NEJM (2008); AAP Bronchiolitis (2014/2022); FDA OTC <6yr (2008)',items:["아이가 숨 쉴 때 갈비뼈 사이가 쏙쏙 들어가거나, 콧구멍이 벌렁거리거나, 그르렁 소리가 나면 숨쉬기가 힘든 것입니다. 주의 깊게 관찰해주세요.","물을 충분히 마시게 해주세요. 수분을 충분히 섭취하면 가래가 묽어져서 기침이 편해집니다.","방 안 습도를 50~60% 정도로 유지해주세요. 가습기를 쓰시면 매일 깨끗이 씻어주세요.","아기의 코가 막혀 있으면, 식염수를 코에 1~2방울 넣은 뒤 코 흡인기로 부드럽게 빼주세요.","잠잘 때 머리를 약간 높여주면 기침과 코막힘이 좀 나아집니다.","6세 미만 아이에게는 약국에서 파는 일반 감기약(기침약, 콧물약 등)을 함부로 먹이지 마세요.","컹컹거리는 기침(목감기로 인한 짖는 기침)이 나면, 차가운 밤공기를 잠깐 쐬거나 욕실에서 뜨거운 물을 틀어 김을 마시게 하면 도움이 될 수 있습니다.","숨을 너무 빠르고 깊게 쉬는 증상(과호흡)이 나타나면, 아이를 안심시키면서 천천히 숨쉬도록 도와주세요. 종이봉투에 대고 쉬게 하는 것은 권장하지 않습니다.","담배 연기, 미세먼지, 향초, 방향제 같은 것은 기침을 악화시킬 수 있으니 피해주세요.","천식이 있는 아이는 흡입기 사용법을 잘 숙지해주세요.","🔴 입술이나 손톱이 파래지거나, 숨쉬기를 매우 힘들어하거나, 말을 못 할 정도로 숨이 차거나, 의식이 흐려지면 즉시 119에 전화해주세요.","🟠 기침이 2주 넘게 계속되거나, 쌕쌕거리는 소리가 반복되거나, 밤에 기침 때문에 잠을 못 자면 외래에 방문해주세요.","🟠 흡입기(흡입기)를 사용해도 숨쉬기가 나아지지 않으면 다시 진료를 받아주세요."]},
{id:'E',name:'객혈/혈담',cc:'[13] Hemoptysis, [51] Blood tinged sputum',ev:'Simon & Aronoff, Pediatr Pulmonol (2017); Chang et al., Chest (2006)',items:["가래에 피가 섞여 나오는 것은 코피가 목 뒤로 넘어가서 나오는 경우가 많습니다.","코피에서 온 것은 갈색이고 구역질과 함께 나오고, 폐에서 온 것은 선홍색이고 기침과 함께 나옵니다.","기침을 억지로 참지 말고, 가래가 나오면 부드럽게 뱉어내게 해주세요.","가래나 구토물에 피가 섞여 나오면 사진을 찍어두세요. 양, 색깔, 시간을 적어두시면 진료에 도움이 됩니다.","아이를 편안하게 해주시고, 상체를 약간 세운 자세로 있게 해주세요.","부드러운 음식과 미지근한 음료를 조금씩 먹여주세요. 뜨겁거나 매운 음식은 피해주세요.","물을 충분히 마시게 해주세요. 목구멍이 마르면 출혈이 심해질 수 있습니다.","코를 세게 풀거나 심하게 기침하는 등 힘을 주는 것은 피하게 해주세요.","지금 먹고 있는 약이 있다면 의사 선생님께 꼭 알려주세요.","🔴 선홍색 피를 한 번에 많이(큰 숟가락 이상) 기침으로 뱉거나, 숨쉬기가 힘들어지거나, 피가 계속 나오면 즉시 119에 전화해주세요.","🟠 가래에 피가 3일 넘게 계속 섞여 나오거나, 열이 함께 나거나, 체중이 줄면 외래에 방문해주세요."]},
{id:'F',name:'신경학적',cc:'[15] Altered mentality, [16] Dizziness, [17] Hemiparesis, [19] Dysarthria, [26] Syncope, [45] Facial palsy, [46] Amnesia, [47] Visual disturbance, [65] Sensory change, [66] Hearing impairment, [78] Lt. weakness, [79] Rt. weakness',ev:'AHA/ASA Pediatric Stroke (2019); AAP Syncope (2007); Friedman, Pediatrics (2009); NICE CG109 (2010)',items:["대부분의 아이 기절(기절)은 심각하지 않은 원인으로 발생합니다. 하지만 정확한 원인 확인이 중요합니다.","오래 서 있는 것을 피하고, 어지러운 느낌이 들면 바로 앉거나 눕게 해주세요.","물을 하루에 6~8잔 정도 충분히 마시게 해주세요.","얼굴 한쪽이 마비된 경우, 눈이 잘 안 감기면 인공눈물을 자주 넣어주시고, 잠잘 때 의료용 테이프로 눈을 가볍게 붙여 보호해주세요.","집에서 간단히 관찰해주세요: 양쪽 팔다리의 힘이 같은지, 말이 어눌하지 않은지, 얼굴 표정이 한쪽으로 치우치지 않는지 살펴봐주세요.","증상이 나타난 시각, 얼마나 오래 계속됐는지, 어떤 상황이었는지(서 있을 때, 운동 중 등)를 적어두세요.","어지러울 때는 갑자기 일어나지 말고, 앉은 자세에서 천천히 일어나게 해주세요.","증상이 있는 동안에는 넘어질 위험이 있는 활동(자전거, 수영, 높은 곳 오르기)은 하지 않게 해주세요.","처방받은 약이 있다면 안내받은 대로 정확히 먹여주세요. 특히 염증을 줄여주는 약(스테로이드) 약은 임의로 끊으면 안 됩니다.","충분한 수면과 규칙적인 생활이 회복에 도움이 됩니다.","증상이 다시 나타나면 그 모습을 동영상으로 찍어두세요. 진료 시 매우 유용합니다.","🔴 갑자기 한쪽 팔다리에 힘이 빠지거나, 말이 갑자기 어눌해지거나, 심한 두통과 구토가 함께 오거나, 경련이 생기거나, 의식이 흐려지면 즉시 119에 전화해주세요.","🟠 증상이 나빠지거나, 새로운 증상이 나타나거나, 얼굴 마비가 2주 넘게 나아지지 않으면 외래에 방문해주세요."]},
{id:'G',name:'GI출혈',cc:'[4] Hematemesis, [5] Melena, [8] Hematochezia',ev:'NASPGHAN GI Bleeding (2012); Teach SJ, Pediatr Emerg Care (2006); AAP AGE (1996)',items:["대변이나 구토물에 피가 섞여 나오면 당황하지 마시고, 색깔과 양을 잘 살펴주세요.","대변이나 구토물 사진을 찍어두세요. 다음 진료 때 보여주시면 큰 도움이 됩니다.","빨간색 음식(비트, 토마토, 딸기)이나 검은색 약(철분제)을 먹으면 대변 색이 바뀔 수 있으니 확인해주세요.","부드럽고 자극이 적은 음식을 조금씩 먹여주세요.","물을 충분히 마시게 해주세요.","부루펜이나 아스피린 같은 약은 출혈을 심하게 할 수 있으니, 통증이 있으면 타이레놀을 사용해주세요.","매운 음식, 탄산음료, 오렌지 주스 같은 자극적인 음식은 피해주세요.","대변을 볼 때 너무 힘을 주지 않도록 해주세요. 변비가 있으면 과일이나 채소를 많이 먹여주세요.","대변의 횟수, 양, 색깔, 피가 섞였는지를 매일 적어주세요.","🔴 선홍색 피를 많이 토하거나, 대변에 피가 많이 나오거나, 의식이 흐려지거나, 배가 심하게 아프면서 식은땀이 나면 즉시 119에 전화해주세요.","🟠 소량의 피가 3일 넘게 계속 나오거나, 검은 대변이 반복되거나, 체중이 줄면 외래에 방문해주세요."]},
{id:'H',name:'구토/오심',cc:'[3] Vomiting, [52] Nausea',ev:'ESPGHAN/ESPID AGE (2014); WHO ORS+Zinc (2005/2020); Freedman, NEJM (2006); 대한소아소화기영양학회 (2020)',items:["아이가 토한 직후에는 30분에서 1시간 정도 아무것도 먹이지 마시고 위장을 쉬게 해주세요.","구토가 멈추면 수분보충음료(약국에서 살 수 있는 경구수액보충제)를 5분마다 한 숟가락(5mL)씩 조금씩 먹여주세요. 토하지 않으면 점점 양을 늘려주세요.","경구수액보충제의 양은 아이 체중 1kg당 50~100mL를 4시간에 걸쳐 나누어 먹이는 것이 좋습니다.","경구수액보충제가 없으면, 끓인 물에 설탕 2큰술과 소금 반 작은술을 섞어서 임시로 만들 수 있습니다.","콜라, 사이다, 과일주스, 스포츠음료는 당분이 너무 많아서 설사를 더 심하게 할 수 있습니다. 경구수액보충제를 대신 사용해주세요.","물을 먹을 수 있게 되면, 죽이나 바나나, 토스트 같은 부드러운 음식을 조금씩 먹여주세요.","기름진 음식, 우유, 단 음식은 처음에는 피하시고, 2~3일에 걸쳐서 서서히 평소 식사로 돌아가세요.","모유를 먹는 아기는 토한 후에도 모유 수유를 멈추지 마세요. 조금씩 자주 먹여주세요.","구토를 막는 약이 처방된 경우, 경구수액보충제를 먹이기 30분 전에 약을 먼저 먹이면 효과적입니다.","아이가 토할 때는 질식을 막기 위해 반드시 옆으로 눕혀주세요. 절대 똑바로 눕힌 채 두지 마세요.","다음과 같은 수분 부족 증상이 보이면 주의해주세요: 입술이 마르거나, 6시간 넘게 소변을 안 보거나, 울 때 눈물이 안 나오거나, 축 늘어져 있을 때입니다.","🔴 초록색 구토, 피가 섞인 구토, 배가 심하게 아프면서 배가 빵빵하게 부풀어 오르거나, 6시간 넘게 소변을 안 보면서 의식이 흐려지면 즉시 응급실에 와주세요.","🟠 구토가 24시간 넘게 계속되거나, 물을 전혀 못 먹거나, 설사와 함께 수분 부족 증상이 보이면 외래 또는 응급실에 방문해주세요."]},
{id:'I',name:'복통/소화기',cc:'[1] Abd. pain, [2] Diarrhea, [54] Abd. distension, [55] Epigastric pain, [56] Dysphagia, [57] Constipation',ev:'ESPGHAN AGE (2014); WHO ORS+Zinc; AAP AGE (1996); Bundy, JAMA (2007); Guarino, JPGN (2014)',items:["배가 아플 때는 편안한 자세로 쉬게 해주세요. 무릎을 가슴 쪽으로 당기는 자세가 편할 수 있습니다.","경구수액보충제(약국에서 구입 가능)를 조금씩 자주 먹여주세요. 한 번에 많이 먹이면 토할 수 있습니다.","설사를 한다고 해서 굶기지 마세요. 죽이나 바나나, 토스트 같은 부드러운 음식을 조금씩 자주 먹여주세요.","설사 중에 우유를 먹이면 배탈이 더 날 수 있습니다. 우유는 잠시 피하시되, 요구르트는 괜찮습니다.","설사를 멈추게 하는 약(설사를 멈추게 하는 약)은 아이에게 먹이지 마세요.","유산균이 안내된 경우 안내받은 대로 먹여주세요. 설사 기간을 줄이는 데 도움이 될 수 있습니다.","변비가 있으면 과일, 채소, 잡곡 같은 식이섬유(채소, 과일, 잡곡 등)이 풍부한 음식과 물을 충분히 먹여주세요. 밥 먹은 뒤 5~10분간 변기에 편안하게 앉는 습관을 들여주세요.","배에 따뜻한 팩을 수건에 감싸서 대주면 배 아픈 것이 좀 나아질 수 있습니다.","설사를 할 때는 기저귀 부위나 엉덩이를 깨끗이 씻고 로션이나 크림를 발라주세요.","대변의 횟수, 묽은 정도, 색깔, 피가 섞였는지를 매일 적어주세요.","장염은 가족에게 옮을 수 있으니 손씻기를 철저히 하시고, 수건과 그릇은 따로 사용해주세요.","🔴 배 아픈 것이 점점 심해지거나, 초록색 구토가 나오거나, 대변에 피가 많이 섞여 나오거나, 배가 딱딱하게 부풀어 오르면 즉시 응급실에 와주세요.","🟠 설사가 7일 넘게 계속되거나, 배 아픈 것이 48시간 지나도 나아지지 않거나, 수분 부족 증상이 보이면 외래에 방문해주세요.","🟠 변비가 2주 넘게 계속되거나, 대변 볼 때 아프거나 피가 나오면 외래에 방문해주세요."]},
{id:'J',name:'상기도/인후',cc:'[48] URI Sx, [49] Sore throat',ev:'AAP URI Management (2013); Shulman et al., IDSA GAS Pharyngitis, CID (2012)',items:["감기는 대부분 7~10일 안에 저절로 좋아집니다. 감기에는 세균을 죽이는 약(항생제)가 효과가 없습니다.","충분히 쉬게 해주시고, 잠을 잘 자게 해주세요.","따뜻한 물이나 보리차를 자주 마시게 해주세요. 목을 촉촉하게 유지하면 목 아픈 것이 좀 나아집니다.","1세 이상 아이에게는 꿀 반 숟가락을 따뜻한 물에 타서 먹이면 기침과 목 통증에 도움이 됩니다. 1세 미만 아기에게는 꿀을 주지 마세요.","6세 이상 아이는 따뜻한 소금물(물 한 컵에 소금 반 작은술)로 입안을 헹구면 목 아픈 것이 좀 나아집니다.","코가 막혀 있으면 식염수 코 스프레이를 사용해주세요. 아기는 코 흡인기로 부드럽게 빼주세요.","세균을 죽이는 약(항생제)가 처방된 경우, 증상이 좋아져도 처방받은 기간(보통 10일) 동안 꼭 끝까지 먹여주세요.","목에 균이 확인된 경우, 세균을 죽이는 약(항생제)를 먹기 시작한 뒤 24시간이 지나면 다른 사람에게 옮길 위험이 크게 줄어듭니다. 그 전까지는 어린이집이나 학교에 보내지 마세요.","6세 미만 아이에게 약국에서 파는 일반 감기약을 함부로 먹이지 마세요.","기침할 때는 팔꿈치 안쪽으로 가리고, 손을 자주 씻고, 수건과 컵은 따로 사용하면 가족에게 옮기는 것을 막을 수 있습니다.","🔴 숨쉬기가 힘들거나, 침을 삼키지 못하거나, 입을 벌리기 어려우면서 고열이 나면 즉시 응급실에 와주세요.","🟠 목 아픈 것이 3일 넘게 나빠지거나, 열이 계속 나거나, 목에 멍울이 만져지거나, 세균을 죽이는 약(항생제)를 먹은 지 48시간이 지나도 나아지지 않으면 외래에 방문해주세요."]},
{id:'K',name:'출혈 Bleeding',cc:'[31] Epistaxis, [32] Vaginal bleeding, [59] Anal bleeding, [67] Oral bleeding, [83] Petechia',ev:'Qureishi et al., BMJ (2014); AAP Menstrual Disorders (2006); Bolton-Maggs, Arch Dis Child (2006)',items:["코피가 나면 아이를 앉힌 상태에서 고개를 약간 앞으로 숙이고, 코의 부드러운 부분(콧방울)을 손가락으로 10~15분간 꾹 눌러주세요.","코피가 날 때 고개를 뒤로 젖히지 마세요. 피가 목으로 넘어가서 토할 수 있습니다.","코피가 멈춘 후 2시간 동안은 코를 풀거나 만지지 않게 해주세요.","입 안에서 피가 나면 깨끗한 거즈나 젖은 차 티백으로 출혈 부위를 10분간 눌러주세요.","출혈 부위에 얼음을 수건에 감싸서 대주면 피 멈추는 데 도움이 됩니다. 직접 얼음을 피부에 대지 마세요.","코피 예방: 방 안 습도를 유지하시고, 코 안쪽에 바셀린을 얇게 발라주세요. 코를 후비지 않도록 알려주세요.","출혈이 있는 동안에는 격렬한 운동이나 뜨거운 목욕은 피해주세요.","피부에 빨간 점들이 여러 개 나타나면, 유리컵 바닥으로 눌러보세요. 눌러도 색이 사라지지 않으면 병원에서 확인이 필요합니다.","지금 먹고 있는 약 중에 출혈을 심하게 할 수 있는 약이 있는지 의사 선생님께 알려주세요.","가족 중에 피가 잘 안 멈추는 병이 있는 분이 있다면 의사 선생님께 알려주세요.","🔴 30분 넘게 피가 안 멈추거나, 피가 많이 나거나, 의식이 흐려지거나, 온몸에 갑자기 빨간 점이나 멍이 나타나면 즉시 응급실에 와주세요.","🟠 일주일에 코피가 3번 이상 나거나, 잇몸에서 계속 피가 나거나, 이유 없이 멍이 잘 생기면 외래에 방문해주세요."]},
{id:'L',name:'외상/화상',cc:'[22] Laceration, [25] Trauma, [28] Needle stick, [29] Burn',ev:'ABA Burn Referral (2006); Hettiaratchy, BMJ (2004); AAP Wound Management (2014); CDC Needlestick (2019)',items:["상처 부위는 하루에 1~2번 깨끗한 물과 순한 비누로 부드럽게 씻어주세요.","씻은 후 처방받은 연고를 얇게 바르고 깨끗한 거즈로 덮어주세요.","꿰맨 상처는 48시간 동안 물에 닿지 않게 해주세요. 그 후에는 씻을 수 있지만 문지르지 마세요.","화상을 입었을 때는 시원한 흐르는 물로 20분 정도 식혀주세요. 얼음이나 버터, 치약은 바르지 마세요.","화상 물집은 일부러 터뜨리지 마세요. 세균이 들어갈 수 있습니다.","화상이 나은 후에도 6개월~1년간은 자외선 차단제(자외선차단지수 30 이상)를 발라주시면 흉터 색소침착을 줄일 수 있습니다.","주사바늘에 찔렸을 때는 비누와 물로 씻고 소독해주세요. 짜내지 마세요.","아파하면 타이레놀이나 부루펜을 아이 체중에 맞게 먹여주세요.","🔴 상처에서 고름이 나오거나, 주변이 빨갛게 번지거나, 열이 38.5도 이상 나거나, 감각이 없어지면 즉시 응급실에 와주세요.","🟠 1주일이 지나도 상처가 나아지지 않거나, 꿰맨 부위가 벌어지거나, 화상 물집이 터져서 진물이 나오면 외래에 방문해주세요."]},
{id:'M',name:'이물',cc:'[27] Foreign body',ev:'Heim et al., Emerg Med Clin (2007); AAP Choking Prevention (2010); Kramer et al., GIE (2015)',items:["삼킨 물건이 위(뱃속)까지 내려갔다면, 대부분 1~4일 안에 대변으로 자연스럽게 나옵니다.","대변을 볼 때 삼킨 물건이 나왔는지 확인해주세요. 채(거름망)를 사용하시면 확인하기 쉽습니다.","과일이나 채소 같은 식이섬유(채소, 과일, 잡곡 등)이 많은 음식을 먹이면 물건이 장을 통과하는 데 도움이 됩니다.","⚠️ 동그란 납작한 배터리(수은전지)를 삼킨 경우에는 매우 위험합니다. 2시간 안에 심한 화상을 입힐 수 있으므로 즉시 응급실에 와주세요.","⚠️ 자석을 2개 이상 삼킨 경우에는 장벽에 구멍이 날 수 있어 매우 위험합니다. 즉시 응급실에 와주세요.","코나 귀에서 물건을 빼낸 후에는 안내받은 날짜에 다시 진료를 받아주세요.","🔴 납작한 배터리나 자석 2개 이상을 삼켰거나, 삼키기가 힘들거나, 침을 계속 흘리거나, 구토가 생기거나, 배 아픈 것이 심해지면 즉시 응급실에 와주세요.","🟠 2주 안에 물건이 대변으로 나오지 않거나, 배가 아프거나 토하거나, 코나 귀에서 분비물이 계속 나오면 외래에 방문해주세요."]},
{id:'N',name:'통증관리',cc:'[6] Flank pain, [20] Weakness, [21] Poor oral intake, [24] Ocular pain, [33] Tooth pain, [34] Back pain, [60] Otalgia, [61] General pain, [68] Hiccup, [71-73] Arm/Leg/Pelvic pain, [80] Scrotal swelling, [81] Neck swelling, [82] Acute pain',ev:'WHO Analgesic Ladder; AAP Pain Assessment (2001); McGrath Pain Scale; Zempsky, Pediatrics (2007)',items:["충분히 쉬게 해주시고 물을 자주 마시게 해주세요.","아픈 부위에 얼음을 수건에 감싸서 15~20분간 대주세요. 하루에 2~3번 해주시면 됩니다.","아파하면 타이레놀이나 부루펜을 아이 체중에 맞게 먹여주세요.","어디가 아픈지, 얼마나 아픈지, 아픈 양상이 어떻게 변하는지를 적어두시면 진료에 도움이 됩니다.","[귀가 아플 때] 세균을 죽이는 약(항생제)가 처방된 경우 꼭 끝까지 먹여주세요. 귀에 물이 들어가지 않게 해주세요.","[귀가 아플 때] 아픈 귀가 위로 가게 눕히지 마세요.","[이가 아플 때] 부드러운 음식을 먹이고, 너무 차갑거나 뜨거운 음식은 피해주세요.","[고환 부위가 부었을 때] 부은 부위를 높여주시고 얼음찜질을 해주세요. 부드러운 속옷을 입혀주세요.","[딸꾹질] 대부분 저절로 멈춥니다. 물을 한 모금씩 천천히 마시게 해보세요.","[입맛이 없을 때] 아이가 좋아하는 음식을 조금씩 자주 먹여주세요. 억지로 먹이지 마세요.","🔴 통증이 갑자기 심해지거나 걸을 수 없을 때, 팔다리 색이 변하거나 감각이 없어지면 즉시 병원에 와주세요.","🔴 고환 부위에 갑자기 심한 통증이 오면 즉시 응급실에 오세요. 6시간 안에 치료해야 하는 응급 상황일 수 있습니다.","🟠 통증이 3일 넘게 나아지지 않거나, 딸꾹질이 48시간 넘게 계속되면 외래에 방문해주세요."]},
{id:'O',name:'혈당이상',cc:'[84] Hypoglycemia, [85] Hyperglycemia',ev:'ADA Standards: Children (2024); Wolfsdorf et al., ISPAD DKA (2018); AAP Hypoglycemia',items:["[혈당이 낮을 때] 식사를 규칙적으로 하게 해주세요. 증상이 나타나면 주스나 사탕 같은 당분을 바로 먹여주세요.","[혈당이 낮을 때] 증상으로는 손 떨림, 식은땀, 어지러움, 힘이 없음, 얼굴이 창백해짐 등이 있습니다.","[혈당이 낮을 때] 당분을 먹인 뒤 15분 후에 혈당을 다시 재주세요. 안 올라가면 한 번 더 먹여주세요.","[혈당이 높을 때] 처방받은 약이나 인슐린을 안내받은 대로 사용해주세요.","[혈당이 높을 때] 혈당 측정 일정을 지켜주세요.","[혈당이 높을 때] 다음 증상이 나타나면 위험할 수 있습니다: 구토, 배 아픔, 숨이 빨라짐, 입에서 과일 냄새가 남.","당분이 없는 음료(물, 보리차)를 충분히 마시게 해주세요.","혈당 수치, 식사 내용, 활동, 증상을 매일 적어두세요.","어린이집이나 학교에 아이의 상태와 응급 시 대처 방법을 미리 알려주세요.","🔴 [혈당이 낮을 때] 의식이 흐려지거나 경련이 생기면 즉시 119에 전화해주세요.","🔴 [혈당이 높을 때] 구토를 하면서 배가 아프고, 숨이 빨라지고, 축 늘어지면 즉시 응급실에 와주세요.","🟠 혈당 조절이 잘 안 되거나, 혈당이 낮아지는 일이 반복되면 외래에 방문해주세요."]},
{id:'P',name:'혈압이상',cc:'[86] Low BP, [87] High BP',ev:'Flynn et al., ACC/AHA Pediatric HTN (2017); AAP High BP Screening (2017)',items:["물을 충분히 마시게 하시고, 식사를 규칙적으로 하게 해주세요.","[혈압이 낮을 때] 누워 있다가 갑자기 일어나면 어지러울 수 있습니다. 앉은 자세를 거쳐 천천히 일어나게 해주세요.","[혈압이 낮을 때] 조이는 스타킹을 신으면 도움이 될 수 있습니다. 의사 선생님과 상의해주세요.","[혈압이 낮을 때] 소금(염분)을 충분히 섭취하게 해주세요. 의사 선생님의 안내를 따라주세요.","[혈압이 높을 때] 음식을 싱겁게 해주세요.","[혈압이 높을 때] 일주일에 3~5번, 30분~1시간 정도 규칙적으로 운동하게 해주세요.","[혈압이 높을 때] 적정 체중을 유지하는 것이 중요합니다.","집에서 혈압을 매일 같은 시간에 재고 적어두시면 진료에 도움이 됩니다.","스트레스를 줄이고 충분히 잠을 자게 해주세요.","🔴 심한 두통과 함께 구토를 하거나 눈이 잘 안 보이면, 즉시 응급실에 와주세요.","🔴 어지럽고 의식이 흐려지면 즉시 119에 전화해주세요.","🟠 두통이나 어지러움이 자주 반복되면 외래에 방문해주세요."]},
{id:'Q',name:'비뇨기',cc:'[36] Dysuria, [37] Hematuria',ev:'AAP UTI (2011/2016); Wan et al., Pediatrics (2012); EAU Pediatric Urology (2023)',items:["물을 충분히 마시게 하시고, 소변을 참지 말고 자주 보게 해주세요.","세균을 죽이는 약(항생제)가 처방된 경우, 증상이 좋아져도 꼭 끝까지 먹여주세요.","소변 색깔, 횟수, 소변 볼 때 아파하는지를 잘 살펴주세요.","소변 횟수, 양, 색깔, 아파하는지를 매일 적어두시면 진료에 도움이 됩니다.","여자아이는 닦을 때 앞에서 뒤쪽으로 닦아주세요. 세균이 옮겨가는 것을 막을 수 있습니다.","통목욕보다 샤워를 하는 것이 좋습니다.","향이 강한 비누나 거품목욕제는 피해주세요.","변비가 있으면 소변 쪽 감염이 다시 생기기 쉽습니다. 변비 예방에도 신경 써주세요.","🔴 소변을 전혀 못 보거나, 옆구리나 아랫배가 심하게 아프면서 열이 나면 응급실에 와주세요.","🟠 소변에 피가 계속 나오거나, 소변 볼 때 아픈 것이 심해지거나, 열이 다시 나면 외래에 방문해주세요."]},
{id:'R',name:'정신건강',cc:'[38] Anxiety, [62] Abnormal behavior, [63] Suicide attempt, [64] Drug intoxication',ev:'AAP Mental Health Screening (2010); AACAP Practice Parameters (2007); Brent et al., JAACAP (2013); APA Emergency Psychiatry',items:["집 안에서 위험할 수 있는 물건(약, 날카로운 물건, 줄, 끈 등)은 치우거나 잠금장치를 해주세요.","아이 곁에서 안정적으로 함께 있어주세요. 비난하지 말아주세요.","감정을 표현하도록 격려해주시되, 억지로 말하게 하지 마세요.","처방받은 약은 안내대로 먹여주세요. 약은 보호자께서 직접 관리해주세요.","매일 규칙적인 생활(수면, 식사, 활동)을 유지하도록 도와주세요.","핸드폰이나 TV 사용 시간을 줄이고, 가족과 이야기하는 시간을 늘려주세요.","학교나 어린이집에 상황을 공유하실 때는 아이의 동의를 먼저 구해주세요.","약을 많이 먹은 경우, 남은 약은 안전하게 버려주세요.","힘든 마음이 들 때 연락할 수 있는 곳: 자살예방상담 1393, 정신건강위기상담 109","🔴 스스로를 해치고 싶은 생각이 다시 들거나, 약을 많이 먹었거나, 의식이 흐려지면 즉시 응급실에 오시거나 119에 전화해주세요.","🟠 불안하거나 평소와 다른 행동이 심해지거나, 잠을 못 자거나 밥을 못 먹거나, 혼자만 있으려고 하면 외래에 방문해주세요."]},
{id:'S',name:'피부/알레르기',cc:'[23] Skin rash/urticaria',ev:'EAACI Urticaria (Zuberbier 2022); WAO Anaphylaxis (Simons 2011); NICE CG57 Atopic Eczema (2007/2023)',items:["어떤 음식을 먹었는지, 어떤 환경에 있었는지를 기억하고 적어두세요. 원인을 찾는 데 도움이 됩니다.","아이가 긁지 않도록 손톱을 짧게 깎아주세요. 아기는 순면 장갑을 끼워주세요.","시원한 환경을 유지해주시고, 자극이 적은 순면 옷을 입혀주세요.","목욕은 미지근한 물로 10분 이내로 하시고, 바로 로션이나 크림를 발라주세요.","향이 없는 순한 세제와 비누를 사용해주세요.","가려움을 줄여주는 약이 처방된 경우 안내대로 먹여주세요.","처방받은 연고는 얇게 바르시고, 의사 선생님이 안내한 기간만 사용해주세요. 얼굴에는 오래 바르지 마세요.","두드러기가 생긴 부위를 사진으로 찍어두세요. 나타난 시간, 위치, 크기 변화를 적어두시면 좋습니다.","응급용 주사(응급 알레르기 주사(에피펜))를 처방받은 경우, 항상 가지고 다니도록 해주세요.","🔴 입술, 혀, 목이 부어올라서 숨쉬기가 힘들거나, 쌕쌕거리는 소리가 나거나, 어지럽고 쓰러질 것 같으면 즉시 119에 전화해주세요. 심한 알레르기 반응일 수 있습니다.","🟠 두드러기가 3일 넘게 계속되거나, 발진과 함께 열이 나거나, 발진이 점점 퍼지거나, 약을 먹어도 나아지지 않으면 외래에 방문해주세요."]},
{id:'T',name:'발작',cc:'[35] Sz (Seizure)',ev:'AAP Febrile Seizure (1999/2011); Epilepsy Foundation First Aid; Offringa & Newton, Cochrane (2012); Shinnar, Pediatrics (2001)',items:["경련(발작)이 일어나면 아이를 안전한 바닥에 옆으로 눕혀주세요.","아이의 입에 절대 아무것도 넣지 마세요.","경련이 몇 분 동안 계속되는지 시간을 꼭 재주세요. 시계나 핸드폰 타이머를 이용해주세요. 시간이 매우 중요합니다.","안전이 확보된 상태에서 가능하다면 경련 모습을 동영상으로 찍어주세요.","주변에 부딪힐 수 있는 물건(가구 모서리 등)을 치워주세요.","경련이 끝난 후에 아이가 멍하거나 혼란스러워하는 것은 정상입니다. 몇 분에서 몇 시간까지 계속될 수 있습니다.","경련이 끝나면 아이를 옆으로 눕혀서 숨길을 확보해주세요. 의식이 완전히 돌아올 때까지 지켜봐주세요.","경련을 막는 약이 처방된 경우, 정해진 시간에 정확히 먹여주세요. 절대로 임의로 약을 끊으면 안 됩니다.","열 때문에 경련이 온 경우, 열이 오르기 시작하면 빨리 열 내리는 약를 먹여주세요. 완전히 막을 수는 없지만 도움이 됩니다.","열 때문에 생긴 경련은 대부분 심각하지 않으며, 뇌에 손상을 주지 않습니다.","경련이 있었던 날짜, 시간, 얼마나 오래 계속됐는지, 어떤 모습이었는지, 열이 있었는지를 적어두세요.","🔴 경련이 5분 넘게 계속되거나, 하루에 2번 이상 반복되거나, 경련 후 의식이 돌아오지 않거나, 숨쉬기가 불규칙하거나 입술이 파래지면 즉시 119에 전화해주세요.","🟠 평소와 다른 행동을 보이거나, 경련이 반복되거나, 학습이나 행동에 변화가 있으면 외래에 방문해주세요."]},
{id:'U',name:'두통',cc:'[18] Headache',ev:'Lewis et al., AAP/AAN, Neurology (2002); Abu-Arafeh, J Child Neurol (2010); Papetti, Front Neurol (2019)',items:["조용하고 어두운 환경에서 충분히 쉬게 해주세요.","물을 충분히 마시게 하시고, 끼니를 거르지 않게 해주세요. 밥을 안 먹으면 두통이 생길 수 있습니다.","나이에 맞게 충분히 잠을 자게 해주세요.","TV, 핸드폰, 컴퓨터 사용 시간을 줄여주세요. 30분마다 눈을 쉬게 해주세요.","스트레스를 줄이고 규칙적인 생활을 하게 도와주세요.","두통이 있었던 날짜, 시간, 아픈 정도(1~10점), 얼마나 오래 아팠는지, 무엇이 원인이었는지, 약을 먹었는지를 적어두세요.","두통을 유발하는 원인을 찾아보세요: 잠을 못 잔 날, 스트레스 받은 날, 특정 음식(초콜릿, 치즈 등)을 먹은 날에 두통이 생기는지 확인해주세요.","두통이 심하면 타이레놀이나 부루펜을 체중에 맞게 먹여주세요. 다만 일주일에 2번 이상 먹이면 오히려 두통이 더 자주 생길 수 있습니다.","눈앞에 번쩍하는 빛이 보이는 등의 전조 증상이 느껴지면 바로 아픔을 줄여주는 약를 먹이는 것이 효과적입니다.","🔴 갑자기 지금까지 느낀 적 없는 극심한 두통이 오거나, 구토와 함께 두통이 점점 심해지거나, 눈이 잘 안 보이거나 걸을 때 비틀거리거나 의식이 흐려지면 즉시 응급실에 와주세요.","🟠 두통이 점점 자주 오거나 세지거나, 밤에 두통 때문에 잠을 깨거나, 두통 때문에 학교에 가지 못하면 외래에 방문해주세요.","🟠 처방받은 약을 먹는 중에 부작용이 의심되면 외래에 방문해주세요."]},
{id:'V',name:'기타/장치/검사',cc:'[44] Jaundice, [53] Catheter device, [58] Abnormal lab, [69] Post OP complication',ev:'AAP Hyperbilirubinemia (2004/2022); CDC CLABSI Prevention (2017); WHO Surgical Safety Checklist',items:["[황달] 자연광 아래에서 아이의 피부와 눈 색깔을 매일 살펴주세요. 젖이나 분유를 충분히 먹여주세요.","[황달 아기] 하루에 8~12번 이상 자주 먹여주세요. 소변과 대변 횟수를 적어주세요.","[관이나 장치가 있는 경우] 꽂혀 있는 부위를 깨끗하고 마른 상태로 유지해주세요.","[관이나 장치가 있는 경우] 관이 빠지거나 위치가 바뀌면 만지지 마시고 바로 병원에 와주세요.","[수술 후] 수술 부위는 안내받은 대로 관리해주세요.","[검사 결과 이상] 안내받은 추가 검사나 진료 일정을 꼭 지켜주세요.","처방받은 약이 있다면 안내대로 정확히 먹여주세요.","체온, 먹는 양, 활동량, 아픈 정도를 매일 적어두세요.","🔴 [황달] 갑자기 심해지면서 아이가 축 늘어지고 젖을 안 먹으면 즉시 응급실에 와주세요.","🔴 관이나 수술 부위가 빨개지거나 고름이 나오거나 열이 나면 즉시 응급실에 와주세요. 출혈이 멈추지 않거나 꿰맨 부위가 벌어져도 즉시 와주세요.","🟠 예상과 다른 증상이 나타나거나, 통증이 심해지거나, 검사 수치를 다시 확인해야 하면 외래에 방문해주세요."]},
{id:'W',name:'사후피임약',cc:'[75]',ev:'WHO Emergency Contraception (2021); ACOG Practice Bulletin (2015); 대한산부인과학회',items:["처방받은 약을 안내받은 시간에 맞춰 복용해주세요.","약을 먹은 후 2시간 안에 토한 경우에는 약을 한 번 더 먹어야 할 수 있습니다. 의사 선생님께 연락해주세요.","속이 메스껍거나, 머리가 아프거나, 피곤하거나, 소량의 출혈이 있을 수 있습니다. 대부분 1~2일 안에 좋아집니다.","약 복용 후 생리가 평소보다 빨라지거나 늦어질 수 있습니다.","다음 생리가 예정일보다 1주일 넘게 늦으면 임신 검사를 해보시는 것이 좋습니다.","사후피임약은 긴급한 상황에서 사용하는 것이며, 평소 피임법으로 사용하는 것이 아닙니다.","앞으로의 피임 방법에 대해 산부인과에서 상담받으시는 것을 권합니다.","사후피임약은 성병을 막아주지 않습니다.","🟠 복통이 심하게 지속되거나 출혈이 많으면 다시 병원에 와주세요.","🟠 2주 넘게 출혈이 계속되거나 불편감이 지속되면 산부인과에 방문해주세요."]}
];

  "모듈 조합 방식(A+특정모듈)이 적절한가?",
  "추가 필요 모듈이 있는가?",
  "CC → 모듈 매핑이 적절한가?",
  "연령별 자동 조정 로직에 대한 의견",

];

// ===== STATE =====
let state = {
  page: 'landing', // landing | info | module | overall | done
  step: 0, // 0=info, 1-23=modules, 24=overall
  name: '', position: '', experience: '',
  ratings: {}, comments: {}, moduleComments: {}, overall: {},
  disagreeTypes: {},
  resumeCode: null
};

const totalSteps = MODULES.length + 2; // info + 23 modules + overall

// ===== API =====
async function saveToStorage(resp) {
  const res = await fetch('/api/responses', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(resp)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: '서버 오류' }));
    throw new Error(err.error || '저장 실패');
  }
  const data = await res.json();
  return data.id;
}

async function saveDraftToServer() {
  flushTextareas();
  if (state.step === 0) {
    state.name = document.getElementById('fname')?.value || state.name;
    state.position = document.getElementById('fpos')?.value || state.position;
    state.experience = document.getElementById('fexp')?.value || state.experience;
  }
  const res = await fetch('/api/drafts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      resumeCode: state.resumeCode, step: state.step,
      name: state.name, position: state.position, experience: state.experience,
      ratings: state.ratings, comments: state.comments,
      moduleComments: state.moduleComments, overall: state.overall,
      disagreeTypes: state.disagreeTypes
    })
  });
  if (!res.ok) throw new Error('임시저장 실패');
  const data = await res.json();
  state.resumeCode = data.code;
  return data.code;
}

async function loadDraftFromServer(code) {
  const res = await fetch('/api/drafts/' + encodeURIComponent(code.trim().toUpperCase()));
  if (!res.ok) { if (res.status === 404) throw new Error('NOT_FOUND'); throw new Error('서버 오류'); }
  return await res.json();
}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');
  const progress = Math.round(((state.page === 'landing' ? 0 : state.step + 1) / totalSteps) * 100);
  document.getElementById('progressFill').style.width = progress + '%';

  if (state.page === 'landing') { renderLanding(app); return; }
  if (state.page === 'done') { renderDone(app); return; }
  if (state.step === 0) { renderInfo(app); return; }
  if (state.step <= MODULES.length) { renderModule(app, state.step - 1); return; }
  renderOverall(app);
}

function renderModule(el, idx) {
  const mod = MODULES[idx];
  const answered = Object.keys(state.ratings[mod.id] || {}).length;
  const total = mod.items.length;

  let itemsHtml = '';
  mod.items.forEach((item, i) => {
    const rating = (state.ratings[mod.id] || {})[i];
    const comment = (state.comments[mod.id] || {})[i] || '';
    const dType = (state.disagreeTypes[mod.id + '-' + i]) || 'modify';
    const isRed = item.startsWith('🔴');
    const isOrange = item.startsWith('🟠');
    const agreed = rating === 1;
    const disagreed = rating === 2;

    itemsHtml += `
      <div class="item ${agreed?'agreed':''} ${disagreed?'disagreed':''} ${isRed?'is-red':''} ${isOrange?'is-orange':''}">
        <div class="item-top">
          <span class="item-num">${i+1}</span>
          <div class="item-body">
            <div class="item-text ${isRed?'red-text':''} ${isOrange?'orange-text':''}">${esc(item)}</div>
            <div class="vote-row">
              <button class="vote-btn vote-agree ${agreed?'active':''}" onclick="rate('${mod.id}',${i},1)">
                ${agreed?'✓':'○'} 동의
              </button>
              <button class="vote-btn vote-disagree ${disagreed?'active':''}" onclick="rate('${mod.id}',${i},2)">
                ${disagreed?'✓':'○'} 비동의
              </button>
            </div>
            ${disagreed ? `
              <div class="disagree-panel">
                <div class="disagree-tabs">
                  <button class="disagree-tab modify ${dType==='modify'?'active':''}" onclick="setDType('${mod.id}',${i},'modify')">✏️ 수정 의견</button>
                  <button class="disagree-tab delete ${dType==='delete'?'active':''}" onclick="setDType('${mod.id}',${i},'delete')">🗑️ 삭제</button>
                </div>
                ${dType==='modify' ? `
                  <textarea class="disagree-textarea" data-mid="${mod.id}" data-idx="${i}" data-type="comment" placeholder="어떻게 수정하면 좋을지 의견을 작성해주세요..." oninput="setComment('${mod.id}',${i},this.value)">${esc(comment.startsWith('[삭제]')?'':comment)}</textarea>
                ` : `
                  <textarea class="disagree-textarea" data-mid="${mod.id}" data-idx="${i}" data-type="comment" placeholder="(선택) 삭제 사유를 입력해주세요..." oninput="setComment('${mod.id}',${i},'[삭제] '+this.value)">${esc(comment.startsWith('[삭제]')?comment.slice(5).trim():comment)}</textarea>
                `}
              </div>
            ` : ''}
          </div>
        </div>
      </div>`;
  });

  el.innerHTML = `
    <div class="container">
      ${stepHeader('Module ' + mod.id + ' — ' + mod.name, (idx+1) + ' / ' + MODULES.length)}
      <div class="card" style="padding:14px 16px;margin-bottom:10px;">
        <span class="badge-cc">🏥 ${esc(mod.cc)}</span>
        <span class="badge-ev">📚 ${esc(mod.ev)}</span>
        <div style="margin-top:8px;">
          <span class="stats-badge ${answered===total?'green':'gray'}">${answered === total ? '✓ 전체 응답 완료' : answered + ' / ' + total + ' 응답'}</span>
        </div>
      </div>
      ${itemsHtml}
      <div class="card module-comment" style="margin-top:12px;">
        <label style="font-size:13px;font-weight:700;display:block;margin-bottom:8px;">💬 Module ${mod.id} 전체 의견</label>
        <textarea data-mid="${mod.id}" data-type="module" placeholder="이 모듈에 대한 추가/삭제/수정 제안..." oninput="state.moduleComments['${mod.id}']=this.value">${esc(state.moduleComments[mod.id]||'')}</textarea>
      </div>
      <div class="nav-row">
        <button class="btn btn-secondary" onclick="prev()">← 이전</button>
        <button class="btn btn-draft" onclick="saveDraft()">💾 중간저장</button>
        <button class="btn btn-primary" onclick="next()">다음 →</button>
      </div>
    </div>`;

  if (shouldScroll) { window.scrollTo({top:0, behavior:'smooth'}); shouldScroll = false; }
}

function renderOverall(el) {
  let qs = '';
  OVERALL_QS.forEach((q,i) => {
    qs += `
      <div class="overall-q">
        <label>${i+1}. ${esc(q)}</label>
        <textarea data-overall="${i}" placeholder="의견을 자유롭게 작성해주세요..." oninput="state.overall[${i}]=this.value">${esc(state.overall[i]||'')}</textarea>
      </div>`;
  });

  el.innerHTML = `
    <div class="container">
      ${stepHeader('종합 의견', '')}
      <div class="card">${qs}</div>
      <div class="nav-row">
        <button class="btn btn-secondary" onclick="prev()">← 이전</button>
        <button class="btn btn-draft" onclick="saveDraft()">💾 중간저장</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submit()">설문 제출 ✓</button>
      </div>
    </div>`;
  if (shouldScroll) { window.scrollTo({top:0, behavior:'smooth'}); shouldScroll = false; }
}

function renderDone(el) {
  el.innerHTML = `
    <div class="container">
      <div class="card done">
        <div class="done-icon">✅</div>
        <h2 style="font-size:20px;font-weight:800;margin-bottom:8px;">설문이 완료되었습니다</h2>
        <p style="font-size:14px;color:var(--text2);margin-bottom:24px;">소중한 의견 감사합니다.<br>응답 내용은 안전하게 저장되었습니다.</p>
        <button class="btn btn-primary" style="max-width:200px;margin:0 auto;" onclick="location.reload()">홈으로</button>
      </div>
    </div>`;
}

// ===== HELPERS =====
function stepHeader(title, subtitle) {
  const progress = Math.round(((state.step + 1) / totalSteps) * 100);
  return `
    <div class="step-header">
      <div class="step-header-top">
        <button class="step-back" onclick="prev()">← 이전</button>
        ${subtitle ? '<span class="step-count">' + subtitle + '</span>' : ''}
      </div>
      <div class="step-title">${title}</div>
      <div class="mini-progress"><div class="mini-progress-fill" style="width:${progress}%"></div></div>
    </div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== ACTIONS =====
let shouldScroll = false; // 페이지 전환 시에만 스크롤

function goTo(page, step) {
  state.page = page === 'landing' ? 'landing' : (page === 'done' ? 'done' : 'survey');
  state.step = step;
  shouldScroll = true;
  render();
}

function saveInfo() {
  state.name = document.getElementById('fname')?.value || '';
  state.position = document.getElementById('fpos')?.value || '';
  state.experience = document.getElementById('fexp')?.value || '';
  if (!state.name.trim()) { showToast('성명을 입력해주세요.'); return false; }
  return true;
}

// 렌더링 전 열려있는 textarea 값을 state에 저장
function flushTextareas() {
  document.querySelectorAll('textarea[data-mid]').forEach(ta => {
    const mid = ta.dataset.mid;
    const idx = parseInt(ta.dataset.idx);
    const type = ta.dataset.type;
    if (type === 'comment') {
      if (!state.comments[mid]) state.comments[mid] = {};
      state.comments[mid][idx] = ta.value;
    } else if (type === 'module') {
      state.moduleComments[mid] = ta.value;
    }
  });
  document.querySelectorAll('textarea[data-overall]').forEach(ta => {
    state.overall[parseInt(ta.dataset.overall)] = ta.value;
  });
}

function next() {
  flushTextareas();
  if (state.step === 0 && !saveInfo()) return;
  if (state.step < MODULES.length + 1) {
    state.step++;
    state.page = 'survey';
  }
  shouldScroll = true;
  render();
}

function prev() {
  flushTextareas();
  if (state.step > 0) { state.step--; state.page = 'survey'; }
  else { state.page = 'landing'; }
  shouldScroll = true;
  render();
}

function rate(mid, idx, val) {
  flushTextareas();
  if (!state.ratings[mid]) state.ratings[mid] = {};
  state.ratings[mid][idx] = val;
  if (val === 1) {
    if (state.comments[mid]) state.comments[mid][idx] = '';
  }
  if (val === 2) {
    if (!state.disagreeTypes[mid + '-' + idx]) state.disagreeTypes[mid + '-' + idx] = 'modify';
  }
  render();
}

function setDType(mid, idx, type) {
  flushTextareas();
  state.disagreeTypes[mid + '-' + idx] = type;
  if (type === 'delete') {
    if (!state.comments[mid]) state.comments[mid] = {};
    if (!state.comments[mid][idx] || !state.comments[mid][idx].startsWith('[삭제]')) {
      state.comments[mid][idx] = '[삭제] 이 항목은 삭제가 필요합니다';
    }
  } else {
    if (state.comments[mid] && state.comments[mid][idx] && state.comments[mid][idx].startsWith('[삭제]')) {
      state.comments[mid][idx] = '';
    }
  }
  render();
}

function setComment(mid, idx, val) {
  if (!state.comments[mid]) state.comments[mid] = {};
  state.comments[mid][idx] = val;
}

async function submit() {
  flushTextareas();
  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
  try {
    await saveToStorage({
      name: state.name, position: state.position, experience: state.experience,
      ratings: state.ratings, comments: state.comments,
      moduleComments: state.moduleComments, overall: state.overall,
      resumeCode: state.resumeCode
    });
    state.page = 'done';
    state.resumeCode = null;
    shouldScroll = true;
    render();
  } catch(e) {
    showToast('저장 중 오류가 발생했습니다. 다시 시도해주세요.');
    if (btn) { btn.disabled = false; btn.textContent = '설문 제출 ✓'; }
  }
}

// ===== DRAFT =====
async function saveDraft() {
  try {
    const code = await saveDraftToServer();
    showDraftModal(code);
  } catch(e) {
    showToast('임시저장 중 오류가 발생했습니다.');
  }
}

async function resumeDraft() {
  const input = document.getElementById('resumeCodeInput');
  const btn = document.getElementById('resumeBtn');
  const errEl = document.getElementById('resumeError');
  const code = (input?.value || '').trim().toUpperCase();
  if (code.length !== 6) {
    errEl.textContent = '6자리 코드를 입력해주세요.';
    errEl.style.display = 'block';
    return;
  }
  btn.disabled = true; btn.textContent = '불러오는 중...';
  errEl.style.display = 'none';
  try {
    const d = await loadDraftFromServer(code);
    state.resumeCode = d.resumeCode;
    state.step = d.step;
    state.name = d.name;
    state.position = d.position;
    state.experience = d.experience;
    state.ratings = d.ratings;
    state.comments = d.comments;
    state.moduleComments = d.moduleComments;
    state.overall = d.overall;
    state.disagreeTypes = d.disagreeTypes;
    state.page = 'survey';
    shouldScroll = true;
    showToast('임시저장된 설문을 불러왔습니다.');
    render();
  } catch(e) {
    errEl.textContent = e.message === 'NOT_FOUND' ? '해당 코드의 저장 데이터가 없습니다.' : '불러오기 중 오류가 발생했습니다.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = '이어하기';
  }
}

function showDraftModal(code) {
  const old = document.getElementById('draftModal');
  if (old) old.remove();
  const div = document.createElement('div');
  div.id = 'draftModal';
  div.className = 'modal-overlay';
  div.onclick = function(e) { if (e.target === div) div.remove(); };
  div.innerHTML = `
    <div class="modal-card">
      <div style="font-size:40px;margin-bottom:8px;">💾</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:4px;">임시저장 완료</div>
      <div class="modal-hint">아래 코드를 메모해두세요.<br>나중에 이 코드로 이어서 작성할 수 있습니다.</div>
      <div class="modal-code">${code}</div>
      <div style="margin-top:20px;">
        <button class="btn-copy" onclick="copyCode('${code}')">📋 코드 복사</button>
        <button class="btn-close-modal" onclick="document.getElementById('draftModal').remove()">닫기</button>
      </div>
    </div>`;
  document.body.appendChild(div);
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => {
    showToast('코드가 복사되었습니다: ' + code);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('코드가 복사되었습니다: ' + code);
  });
}

// ===== INIT =====
render();
</script>
</body>
</html>
