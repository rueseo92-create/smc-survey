services:
  - type: web
    name: smc-survey
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ADMIN_PW
        sync: false
      - key: NODE_ENV
        value: production
